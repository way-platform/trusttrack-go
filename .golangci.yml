# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"

run:
  go: "1.26"
  build-tags: []

issues:
  exclude-dirs:
    - proto/gen

formatters:
  enable:
    - gci
    - gofumpt
    - goimports
    - golines
  settings:
    golines:
      max-len: 120

linters:
  enable:
    - gosec
  settings:
    gosec:
      excludes:
        # Pre-existing proto/binary integer conversions; values are API-bounded.
        - G115
        # Struct field name pattern matching — data carrier types (APIKey), not hardcoded secrets.
        - G117

  exclusions:
    rules:
      # Test files: hardcoded test tokens/URLs and test file I/O are not vulnerabilities.
      - path: "_test\\.go"
        linters:
          - gosec
        text: "G101|G304|G306"
